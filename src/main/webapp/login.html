<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodieExpress - Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background-image:
    linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
    url("https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1500&q=80");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.container{
    width:400px;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.logo{
    text-align:center;
    color:#ff5722;
    font-size:34px;
    font-weight:bold;
    margin-bottom:8px;
}

.tagline{
    text-align:center;
    color:#666;
    margin-bottom:25px;
    font-size:14px;
}

h2{
    text-align:center;
    color:#333;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    color:#444;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    font-size:15px;
}

input:focus{
    border:1px solid #ff5722;
}

.forgot{
    text-align:right;
    margin-top:-5px;
    margin-bottom:18px;
}

.forgot a{
    text-decoration:none;
    color:#ff5722;
    font-size:14px;
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:8px;
    background:#ff5722;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#e64a19;
}

.register{
    text-align:center;
    margin-top:20px;
    color:#555;
}

.register a{
    text-decoration:none;
    color:#ff5722;
    font-weight:bold;
}

</style>

</head>
<body>

<div class="container">

    <div class="logo">
        🍔 FoodieExpress
    </div>

    <div class="tagline">
        Fresh Food • Fast Delivery • Great Taste
    </div>

    <h2>Login to Your Account</h2>

    <form action="callLoginServlet" method="post">

        <div class="form-group">
            <label>Email Address</label>
            <input type="email"
                   name="email"
                   placeholder="Enter your email"
                   required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password"
                   name="password"
                   placeholder="Enter your password"
                   required>
        </div>

        <div class="forgot">
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="register">
        Don't have an account?
        <a href="Register.html">Register Now</a>
    </div>

</div>

</body>
</html>
