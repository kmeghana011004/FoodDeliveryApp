<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodieExpress | Register</title>

<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: 'Segoe UI', sans-serif;
}

body {
	height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
	background: linear-gradient(rgba(0, 0, 0, .55), rgba(0, 0, 0, .55)),
		url("https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1600&q=80");
	background-size: cover;
	background-position: center;
}

.card {
	width: 430px;
	background: white;
	border-radius: 20px;
	padding: 35px;
	box-shadow: 0 10px 30px rgba(0, 0, 0, .35);
	animation: popup .6s;
}

keyframes popup {from { transform:scale(.8);
	opacity: 0;
}

to {
	transform: scale(1);
	opacity: 1;
}

}
.logo {
	text-align: center;
	font-size: 34px;
	font-weight: bold;
	color: #ff5722;
	margin-bottom: 5px;
}

.subtitle {
	text-align: center;
	color: #777;
	margin-bottom: 30px;
}

.input-group {
	margin-bottom: 18px;
}

label {
	display: block;
	margin-bottom: 7px;
	font-weight: 600;
	color: #444;
}

input, textarea, select {
	width: 100%;
	padding: 13px;
	border: 1px solid #ddd;
	border-radius: 10px;
	font-size: 15px;
	outline: none;
	transition: .3s;
}

input:focus, textarea:focus, select:focus {
	border-color: #ff5722;
	box-shadow: 0 0 8px rgba(255, 87, 34, .25);
}

textarea {
	height: 80px;
	resize: none;
}

.register-btn {
	width: 100%;
	padding: 14px;
	border: none;
	border-radius: 10px;
	background: #ff5722;
	color: white;
	font-size: 18px;
	cursor: pointer;
	transition: .3s;
	margin-top: 10px;
}

.register-btn:hover {
	background: #e64a19;
	transform: translateY(-2px);
}

.login {
	text-align: center;
	margin-top: 20px;
	color: #555;
}

.login a {
	color: #ff5722;
	font-weight: bold;
	text-decoration: none;
}

.login a:hover {
	text-decoration: underline;
}
</style>

</head>

<body>

	<div class="card">

		<div class="logo">🍔 FoodieExpress</div>

		<p class="subtitle">Create your account and start ordering
			delicious food</p>

		<form action="callRegisterServlet" method="post">

			<div class="input-group">

				<label>Username</label> <input type="text" name="username"
					placeholder="Enter Username" required>

			</div>

			<div class="input-group">

				<label>Password</label> <input type="password" name="password"
					placeholder="Enter Password" required>

			</div>

			<div class="input-group">

				<label>Email</label> <input type="email" name="email"
					placeholder="Enter Email Address" required>

			</div>




			<div class="input-group">

				<label>Address</label>

				<textarea name="address" placeholder="Enter Complete Address"
					required></textarea>

			</div>

			<div class="input-group">

				<label>Role</label> <select name="role">

					<option value="">Select </option>
					
					<option value="customer">Customer</option>

					<option value="superAdmin">Restaurant Admin</option>

					<option value="deliveryAgent">Delivery Partner</option>

				</select>

			</div>

			<button class="register-btn">Create Account</button>

		</form>

		<div class="login">

			Already have an account? <a href="login.html"> Login </a>

		</div>

	</div>

</body>
</html>
