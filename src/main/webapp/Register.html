<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodieExpress | Register</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:30px;

    background:
    linear-gradient(rgba(0,0,0,.60), rgba(0,0,0,.60)),
    url("https://images.unsplash.com/photo-1414235077428-338989a2e8c0?auto=format&fit=crop&w=1920&q=80");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}
.card{
    width:100%;
    max-width:470px;
    padding:40px 35px;
    border-radius:24px;

    background:linear-gradient(
        135deg,
        rgba(255,255,255,.98),
        rgba(255,245,240,.96),
        rgba(255,236,225,.95)
    );

    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.4);

    box-shadow:
        0 20px 50px rgba(0,0,0,.25),
        0 0 25px rgba(255,90,60,.12);

    animation:popup .6s ease;
}

@keyframes popup{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo{
    text-align:center;
    font-size:38px;
    font-weight:700;
    color:#ff5a3c;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#666;
    font-size:15px;
    margin-bottom:30px;
    line-height:24px;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#444;
    font-weight:600;
    font-size:15px;
}

input,
textarea,
select{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    background:#fafafa;
    font-size:15px;
    transition:.3s;
}

input:focus,
textarea:focus,
select:focus{
    outline:none;
    background:#fff;
    border-color:#ff5a3c;
    box-shadow:0 0 0 4px rgba(255,90,60,.15);
}

textarea{
    min-height:90px;
    resize:none;
}

select{
    cursor:pointer;
}

.register-btn{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#ff5a3c,#ff7b42);
    color:#fff;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 10px 20px rgba(255,90,60,.25);
}

.register-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 30px rgba(255,90,60,.35);
}

.register-btn:active{
    transform:scale(.98);
}

.login{
    margin-top:25px;
    text-align:center;
    color:#666;
    font-size:15px;
}

.login a{
    color:#ff5a3c;
    text-decoration:none;
    font-weight:700;
}

.login a:hover{
    text-decoration:underline;
}

@media(max-width:500px){

.card{
    padding:28px 22px;
}

.logo{
    font-size:32px;
}

.subtitle{
    font-size:14px;
}

}
</style>

</head>

<body>

	<div class="card">

		<div class="logo">🍔 FoodieExpress</div>

		<p class="subtitle">Create your account and start ordering
			delicious food</p>

		<form action="callRegisterServlet" method="post">

			<div class="input-group">

				<label>Username</label> <input type="text" name="username"
					placeholder="Enter Username" required>

			</div>

			<div class="input-group">

				<label>Password</label> <input type="password" name="password"
					placeholder="Enter Password" required>

			</div>

			<div class="input-group">

				<label>Email</label> <input type="email" name="email"
					placeholder="Enter Email Address" required>

			</div>




			<div class="input-group">

				<label>Address</label>

				<textarea name="address" placeholder="Enter Complete Address"
					required></textarea>

			</div>

			<div class="input-group">

				<label>Role</label> <select name="role">

					<option value="">Select </option>
					
					<option value="customer">Customer</option>

					<option value="superAdmin">Restaurant Admin</option>

					<option value="deliveryAgent">Delivery Partner</option>

				</select>

			</div>

			<button class="register-btn">Create Account</button>

		</form>

		<div class="login">

			Already have an account? <a href="login.jsp"> Login </a>

		</div>

	</div>

</body>
</html>
